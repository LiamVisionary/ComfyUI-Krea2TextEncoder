<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Noto Sans, DejaVu Sans, sans-serif">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141B2A"/>
      <stop offset="1" stop-color="#0A0E16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3FE3FF"/>
      <stop offset="0.5" stop-color="#8B7CFF"/>
      <stop offset="1" stop-color="#FF86D6"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3FE3FF"/>
      <stop offset="0.5" stop-color="#8B7CFF"/>
      <stop offset="1" stop-color="#FF86D6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#8B7CFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#8B7CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#tile)"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#glow)"/>
  <rect x="25.5" y="25.5" width="461" height="461" rx="110.5" fill="none" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.85"/>

  <!-- input ports (left) -->
  <circle cx="92" cy="196" r="11" fill="#0E1422" stroke="#3FE3FF" stroke-width="4"/>
  <circle cx="92" cy="256" r="11" fill="#0E1422" stroke="#8B7CFF" stroke-width="4"/>
  <circle cx="92" cy="316" r="11" fill="#0E1422" stroke="#FF86D6" stroke-width="4"/>
  <!-- output port (right) -->
  <circle cx="420" cy="256" r="11" fill="#0E1422" stroke="#5CF2B0" stroke-width="4"/>

  <!-- K2 monogram -->
  <text x="256" y="312" text-anchor="middle" fill="url(#accent)" font-size="232" font-weight="700" letter-spacing="-8">K2</text>

  <!-- token-stack motif (the 12-layer tap, abstracted) -->
  <g transform="translate(168,372)">
    <rect x="0"  y="0"  width="176" height="13" rx="6.5" fill="url(#accentH)" opacity="0.95"/>
    <rect x="28" y="24" width="120" height="13" rx="6.5" fill="url(#accentH)" opacity="0.55"/>
  </g>
</svg>
